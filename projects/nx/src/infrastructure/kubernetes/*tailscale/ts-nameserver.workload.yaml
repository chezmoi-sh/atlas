# trunk-ignore-all(checkov,trivy)
---
# This Kubernetes manifest deploys a custom CoreDNS server
# configured to forward DNS queries to the Tailscale network.
# It is essential for enabling DNS resolution for all Tailscale
# sidecar containers within the cluster, ensuring seamless
# integration and connectivity across the Tailscale network.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/instance: nameserver
  name: ts-nameserver
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: nameserver
  serviceName: ts-nameserver
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: nameserver
    spec:
      containers:
        - args:
            - -conf
            - /etc/coredns/Corefile
          image: docker.io/coredns/coredns:1.12.1
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          name: coredns
          ports:
            - name: dns-udp
              containerPort: 1053
              protocol: UDP
            - name: dns-tcp
              containerPort: 1053
              protocol: TCP
            - name: metrics
              containerPort: 9153
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /ready
              port: 8181
            periodSeconds: 2
            successThreshold: 1
            timeoutSeconds: 1
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - NET_BIND_SERVICE
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /etc/coredns
              name: config-volume

        - name: tailscale
          image: tailscale/tailscale:v1.82.0
          imagePullPolicy: IfNotPresent
          env:
            - name: TS_ENABLE_DNS
              value: "true"
            - name: TS_USERSPACE
              value: "false"
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-operator-oauth
                  key: client_secret
            - name: TS_ENABLE_METRICS
              value: "true"
            - name: TS_ENABLE_HEALTHCHECK
              value: "true"
            - name: TS_KUBE_SECRET
              value: ts-nameserver-0
            - name: TS_EXTRA_ARGS
              value: --advertise-tags=tag:kubernetes-apps # TODO: create a new tag for kubernetes-ns with no rights

            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
          resources:
            requests:
              squat.ai/tun: "1"
            limits:
              squat.ai/tun: "1"
          securityContext:
            privileged: true
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
      securityContext:
        fsGroup: 29833
        runAsUser: 29833
        runAsGroup: 29833
        runAsNonRoot: true
      serviceAccountName: ts-nameserver
      volumes:
        - name: config-volume
          configMap:
            name: ts-nameserver-config
---
apiVersion: v1
kind: Service
metadata:
  name: ts-nameserver
spec:
  clusterIP: 10.43.0.100
  ports:
    - name: dns
      port: 53
      protocol: UDP
      targetPort: 1053
    - name: dns-tcp
      port: 53
      protocol: TCP
      targetPort: 1053
    - name: metrics
      port: 9153
      protocol: TCP
      targetPort: 9153
